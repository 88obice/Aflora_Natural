{% extends 'base.html' %}
{% block title %}Recuperar contraseña — Aflora Natural{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 mt-4" style="background:#fff; border-color:var(--rose-light);">
            <h3 style="font-size:1.3rem; margin-bottom:0.4rem;">Recuperar contraseña</h3>
            <p class="text-muted small mb-3">Te enviaremos un link a tu email para restablecerla.</p>
            <form method="post">{% csrf_token %}
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
                <button class="btn btn-primary w-100 mt-3">Enviar link</button>
            </form>
            <small class="text-muted d-block mt-2"><a href="{% url 'usuarios:login' %}" style="color:var(--terracotta);">← Volver al login</a></small>
        </div>
    </div>
</div>
{% endblock %}
